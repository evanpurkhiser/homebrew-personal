name: bump

on:
  workflow_dispatch:
    inputs:
      formula:
        description: Formula name (e.g. keyfinder-cli)
        required: true
      version:
        description: New version (e.g. 1.3.0)
        required: true
  repository_dispatch:
    types:
      - bump-formula

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_NO_AUTO_UPDATE: 1

jobs:
  bump:
    name: bump
    runs-on: macos-latest

    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up tap
        run: |
          mkdir -p $(brew --repository)/Library/Taps/evanpurkhiser
          ln -s $GITHUB_WORKSPACE $(brew --repository)/Library/Taps/evanpurkhiser/homebrew-personal

      - name: Bump formula
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          FORMULA="${{ github.event.inputs.formula || github.event.client_payload.formula }}"
          VERSION="${{ github.event.inputs.version || github.event.client_payload.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          brew bump-formula-pr \
            --write-only \
            --commit \
            --no-audit \
            --version="$VERSION" \
            "evanpurkhiser/personal/$FORMULA"

      - name: Push
        run: git push origin main

      - name: Trigger build
        run: gh workflow run main.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
