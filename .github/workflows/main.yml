name: build
on:
  push:
    branches:
      - main
  # Manual bump + bottle flow. This produces a single atomic commit on main.
  workflow_dispatch:
    inputs:
      formula:
        description: Formula to bump and bottle
        required: true
      version:
        description: New version
        required: true

env:
  HOMEBREW_DEVELOPER: 1
  BOTTLE_ROOT_URL: "https://ghcr.io/v2/evanpurkhiser/personal"

jobs:
  prepare:
    name: resolve formula matrix
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - uses: actions/checkout@v3
      - id: packages
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PACKAGES=$(printf '["%s"]' "${{ github.event.inputs.formula }}")
          else
            PACKAGES=$(python3 -c 'import json; from pathlib import Path; files = sorted(Path(".").glob("*.rb")); print(json.dumps([f.stem for f in files]))')
          fi

          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

  build:
    name: build
    needs: prepare
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.prepare.outputs.packages) }}

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up tap
        run: |
          mkdir -p $(brew --repository)/Library/Taps/evanpurkhiser
          ln -s $GITHUB_WORKSPACE $(brew --repository)/Library/Taps/evanpurkhiser/homebrew-personal

      - name: Bump formula
        if: github.event_name == 'workflow_dispatch'
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          brew bump-formula-pr \
            --write-only \
            --no-audit \
            --version="${{ github.event.inputs.version }}" \
            "evanpurkhiser/personal/${{ github.event.inputs.formula }}"

      - name: Build and bottle package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /usr/local/include/c++
          FORMULA_NAME="${{ matrix.package }}"
          FORMULA="evanpurkhiser/personal/${FORMULA_NAME}"

          # Always build to verify the formula and generate metadata
          brew install --force --build-bottle "$FORMULA"
          brew bottle --force-core-tap --json --root-url="$BOTTLE_ROOT_URL" "$FORMULA"

      - name: Upload bottle and update formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.actor }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          brew install skopeo

          FORMULA_NAME="${{ matrix.package }}"
          VERSION=$(brew info --json=v1 --formula "evanpurkhiser/personal/${FORMULA_NAME}" | jq -r '.[0].versions.stable')

          # Skip if this bottle version is already published to GitHub Packages
          IMAGE="ghcr.io/evanpurkhiser/personal/${FORMULA_NAME}:${VERSION}"
          if skopeo inspect --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" "docker://${IMAGE}" > /dev/null 2>&1; then
            echo "Bottle ${IMAGE} already exists, skipping upload."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          brew pr-upload --root-url="$BOTTLE_ROOT_URL" --warn-on-upload-failure --no-commit

      - name: Create bottle commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          FORMULA_NAME="${{ matrix.package }}"
          VERSION=$(brew info --json=v1 --formula "evanpurkhiser/personal/${FORMULA_NAME}" | jq -r '.[0].versions.stable')
          VERSION="${VERSION#v}"

          git add -A
          git commit -m "${FORMULA_NAME}: v${VERSION} (bottled)"

      - name: Push commit
        run: |
          TARGET_BRANCH="${{ github.ref_name }}"
          # workflow_dispatch runs from the selected ref, but the atomic bump+bottle commit should land on main.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_BRANCH="main"
          fi

          git pull --rebase origin "$TARGET_BRANCH"
          git push origin HEAD:"$TARGET_BRANCH"
