name: build
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HOMEBREW_DEVELOPER: 1
  BOTTLE_ROOT_URL: "https://ghcr.io/v2/evanpurkhiser/personal"

jobs:
  build:
    name: build
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - libkeyfinder
          - keyfinder-cli
          - tremc
          - things3-cloud

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up tap
        run: |
          mkdir -p $(brew --repository)/Library/Taps/evanpurkhiser
          ln -s $GITHUB_WORKSPACE $(brew --repository)/Library/Taps/evanpurkhiser/homebrew-personal

      - name: Build and bottle package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /usr/local/include/c++
          FORMULA_NAME="${{ matrix.package }}"
          FORMULA="evanpurkhiser/personal/${FORMULA_NAME}"

          # Always build to verify the formula and generate metadata
          brew install --force --build-bottle "$FORMULA"
          brew bottle --force-core-tap --json --root-url="$BOTTLE_ROOT_URL" "$FORMULA"

      - name: Upload bottle and update formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.actor }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          brew install skopeo

          FORMULA_NAME="${{ matrix.package }}"
          VERSION=$(brew info --json=v1 --formula "evanpurkhiser/personal/${FORMULA_NAME}" | jq -r '.[0].versions.stable')

          # Skip if this bottle version is already published to GitHub Packages
          IMAGE="ghcr.io/evanpurkhiser/personal/${FORMULA_NAME}:${VERSION}"
          if skopeo inspect --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" "docker://${IMAGE}" > /dev/null 2>&1; then
            echo "Bottle ${IMAGE} already exists, skipping upload."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          brew pr-upload --root-url="$BOTTLE_ROOT_URL" --warn-on-upload-failure

          git pull --rebase origin main && git push origin main

