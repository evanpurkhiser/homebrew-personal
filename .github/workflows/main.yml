name: build
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HOMEBREW_DEVELOPER: 1

jobs:
  build:
    name: build
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - libkeyfinder
          - keyfinder-cli
          - tremc
          - things3-cloud

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up tap
        run: |
          mkdir -p $(brew --repository)/Library/Taps/evanpurkhiser
          ln -s $GITHUB_WORKSPACE $(brew --repository)/Library/Taps/evanpurkhiser/homebrew-personal

      - name: Build and bottle package
        id: bottle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /usr/local/include/c++
          FORMULA_NAME="${{ matrix.package }}"
          FORMULA="evanpurkhiser/personal/${FORMULA_NAME}"
          VERSION=$(brew info --json=v1 --formula "$FORMULA" | jq -r '.[0].versions.stable')
          TAG="${FORMULA_NAME}-${VERSION}"
          
          echo "formula=${FORMULA}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # 1. If formula already has a bottle block, we are DONE.
          if brew info --json=v1 --formula "$FORMULA" | jq -e '.[0].bottle.stable' >/dev/null; then
            echo "bottled=true" >> $GITHUB_OUTPUT
            echo "Formula already has a bottle block. Skipping everything."
            exit 0
          fi
          echo "bottled=false" >> $GITHUB_OUTPUT

          # 2. Check if the RELEASE already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release_exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists."
          else
            echo "release_exists=false" >> $GITHUB_OUTPUT
          fi
          
          # 3. We MUST build to get the *.json metadata for the 'brew bottle --merge' step
          # (Homebrew doesn't provide a way to generate the mergeable JSON without a build)
          brew install --force --build-bottle "$FORMULA"
          brew bottle --force-core-tap "$FORMULA"

      - name: Create Release
        if: steps.bottle.outputs.bottled == 'false' && steps.bottle.outputs.release_exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.bottle.outputs.tag }}"
          gh release create "$TAG" --title "$TAG" --notes "Bottle for $TAG"

      - name: Upload Bottle
        if: steps.bottle.outputs.bottled == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.bottle.outputs.tag }}"
          gh release upload "$TAG" *.bottle.tar.gz --clobber

      - name: Update Formula
        if: steps.bottle.outputs.bottled == 'false'
        run: |
          FORMULA_FILE="./${{ matrix.package }}.rb"
          brew bottle --merge --write --force-core-tap "$FORMULA_FILE" *.json

      - name: Push Changes
        if: steps.bottle.outputs.bottled == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ matrix.package }}.rb"
          git commit -m "${{ matrix.package }}: update bottle for ${{ steps.bottle.outputs.version }}"
          git push origin main

