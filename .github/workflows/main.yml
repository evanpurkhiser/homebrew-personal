name: build
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HOMEBREW_DEVELOPER: 1

jobs:
  build:
    name: build
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - libkeyfinder
          - keyfinder-cli
          - tremc
          - things3-cloud

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up tap
        run: |
          mkdir -p $(brew --repository)/Library/Taps/evanpurkhiser
          ln -s $GITHUB_WORKSPACE $(brew --repository)/Library/Taps/evanpurkhiser/homebrew-personal

      - name: Build and bottle package
        id: bottle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /usr/local/include/c++
          FORMULA_NAME="${{ matrix.package }}"
          FORMULA="evanpurkhiser/personal/${FORMULA_NAME}"
          VERSION=$(brew info --json=v1 --formula "$FORMULA" | jq -r '.[0].versions.stable')
          TAG="${FORMULA_NAME}-${VERSION}"
          
          echo "formula=${FORMULA}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Always build to verify the formula and generate metadata
          brew install --force --build-bottle "$FORMULA"
          brew bottle --force-core-tap "$FORMULA"

          # Check if we need to update the recipe (i.e. it doesn't have a bottle block yet)
          if brew info --json=v1 --formula "$FORMULA" | jq -e '.[0].bottle.stable' >/dev/null; then
            echo "needs_recipe_update=false" >> $GITHUB_OUTPUT
          else
            echo "needs_recipe_update=true" >> $GITHUB_OUTPUT
          fi

          # Check if the release/bottle asset already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release_exists=true" >> $GITHUB_OUTPUT
          else
            echo "release_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Bottle
        if: steps.bottle.outputs.release_exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.bottle.outputs.tag }}"
          gh release create "$TAG" *.bottle.tar.gz --title "$TAG" --notes "Bottle for $TAG"

      - name: Update Formula
        if: steps.bottle.outputs.needs_recipe_update == 'true'
        run: |
          FORMULA_FILE="./${{ matrix.package }}.rb"
          brew bottle --merge --write --force-core-tap "$FORMULA_FILE" *.json

      - name: Push Changes
        if: steps.bottle.outputs.needs_recipe_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ matrix.package }}.rb"
          git commit -m "${{ matrix.package }}: update bottle for ${{ steps.bottle.outputs.version }}"
          git push origin main

