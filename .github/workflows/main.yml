name: build
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HOMEBREW_DEVELOPER: 1

jobs:
  build:
    name: build
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - libkeyfinder
          - keyfinder-cli
          - tremc
          - things3-cloud

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up tap
        run: |
          mkdir -p $(brew --repository)/Library/Taps/evanpurkhiser
          ln -s $GITHUB_WORKSPACE $(brew --repository)/Library/Taps/evanpurkhiser/homebrew-personal

      - name: Build and bottle package
        id: bottle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /usr/local/include/c++
          FORMULA_NAME="${{ matrix.package }}"
          FORMULA="evanpurkhiser/personal/${FORMULA_NAME}"
          
          # Always build to verify the formula and generate metadata
          brew install --force --build-bottle "$FORMULA"
          brew bottle --force-core-tap --json "$FORMULA"

          VERSION=$(brew info --json=v1 --formula "$FORMULA" | jq -r '.[0].versions.stable')
          TAG="${FORMULA_NAME}-${VERSION}"
          
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use GH API to check if the tag exists on the remote
          if gh api "repos/${{ github.repository }}/releases/tags/${{ steps.bottle.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Bottle
        if: steps.check_release.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.bottle.outputs.tag }}"
          gh release create "$TAG" *.bottle.tar.gz --title "$TAG" --notes "Bottle for $TAG"

      - name: Update Formula and Push
        if: steps.check_release.outputs.exists == 'false'
        run: |
          TAG="${{ steps.bottle.outputs.tag }}"
          ROOT_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Update the recipe with the new bottle block and the correct root_url
          brew bottle --merge --write --force-core-tap --root-url="$ROOT_URL" *.json

          # Push changes
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Pull the latest changes to avoid conflicts from parallel jobs
          git pull --rebase origin main
          
          git add "*.rb"
          if git commit -m "${{ matrix.package }}: update bottle for ${{ steps.bottle.outputs.version }}"; then
            git push origin main
          else
            echo "No changes to commit"
          fi

