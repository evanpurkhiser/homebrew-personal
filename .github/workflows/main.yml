name: build
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HOMEBREW_DEVELOPER: 1

jobs:
  build:
    name: build
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - libkeyfinder
          - keyfinder-cli
          - tremc
          - things3-cloud

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Build and bottle package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /usr/local/include/c++
          FORMULA_NAME="${{ matrix.package }}"
          FORMULA_FILE="./${FORMULA_NAME}.rb"
          VERSION=$(brew info --json=v1 --formula "$FORMULA_FILE" | jq -r '.[0].versions.stable')
          TAG="${FORMULA_NAME}-${VERSION}"

          # 1. Build from source
          brew install --force --build-bottle --build-from-source --formula "$FORMULA_FILE"

          # 2. Check if a bottle for this version already exists in releases
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Bottle for $TAG already exists, skipping bottling."
            exit 0
          fi

          # 3. Create bottle artifact
          # We need to use the formula name as it appears in the tap
          brew bottle --force-core-tap "$FORMULA_FILE"

          # 4. Create release and upload bottle
          gh release create "$TAG" --title "$TAG" --notes "Bottle for $TAG" || true
          gh release upload "$TAG" *.bottle.tar.gz

          # 5. Update formula with bottle block
          # brew bottle --merge --write adds the block to the formula file
          brew bottle --merge --write --force-core-tap "$FORMULA_FILE" *.json

          # 6. Push updated formula back to repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA_FILE"
          git commit -m "${FORMULA_NAME}: update bottle for ${VERSION}"
          git push origin main
