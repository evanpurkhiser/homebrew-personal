name: build
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HOMEBREW_DEVELOPER: 1

jobs:
  build:
    name: build
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - libkeyfinder
          - keyfinder-cli
          - tremc
          - things3-cloud

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up tap
        run: |
          mkdir -p $(brew --repository)/Library/Taps/evanpurkhiser
          ln -s $GITHUB_WORKSPACE $(brew --repository)/Library/Taps/evanpurkhiser/homebrew-personal

      - name: Build and bottle package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /usr/local/include/c++
          FORMULA_NAME="${{ matrix.package }}"
          FORMULA="evanpurkhiser/personal/${FORMULA_NAME}"
          ROOT_URL="https://ghcr.io/v2/evanpurkhiser/personal"

          # Always build to verify the formula and generate metadata
          brew install --force --build-bottle "$FORMULA"
          brew bottle --force-core-tap --json --root-url="$ROOT_URL" "$FORMULA"

      - name: Upload bottle and update formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.actor }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Upload the bottle to GitHub Packages, merge the bottle block into
          # the formula, and commit. Skips upload if the bottle already exists.
          brew pr-upload --root-url="https://ghcr.io/v2/evanpurkhiser/personal" --warn-on-upload-failure

          # Rebase on top of any changes from parallel jobs, then push.
          # Retry loop handles the race where another job pushes between our
          # rebase and push.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push --force-with-lease origin main && break
            echo "Push failed (attempt $i), retrying..."
            sleep $((i * 2))
          done

